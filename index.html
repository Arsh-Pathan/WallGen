<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WallGen</title>
    <meta
      name="description"
      content="A standalone live wallpaper with rotating quotes and ambient motion."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="backdrop">
        <div class="backdrop-image" id="backdropImage"></div>
        <div class="backdrop-overlay"></div>
      </div>

      <main class="content">
        <section class="headline-panel" id="headlinePanel">
          <p class="quote" id="quoteText"></p>
          <p class="quote-author">
            <span id="quoteAuthor"></span>
          </p>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
